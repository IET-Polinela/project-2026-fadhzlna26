<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #ffe3ef, #e8f0ff);
            color: #333;
        }

        .spa-container {
            min-height: calc(100vh - 80px);
        }

        .navbar-custom {
            background-color: #ff5fa2;
        }

        .navbar-brand {
            color: #ffffff !important;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.10);
        }

        .btn-primary {
            background-color: #ff5fa2;
            border-color: #ff5fa2;
        }

        .btn-primary:hover {
            background-color: #f04b91;
            border-color: #f04b91;
        }

        .text-primary {
            color: #ff5fa2 !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
        </a>

        <div id="nav-menus" class="ms-auto"></div>
    </div>
</nav>

<main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/router.js"></script>

</body>
</html>
