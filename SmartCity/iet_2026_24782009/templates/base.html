<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}IET City{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- 🔥 CUSTOM STYLE -->
    <style>
        body{
            background: linear-gradient(135deg,#ffd6e8,#d6e8ff);
        }

        /* 🔥 BUTTON PINK (FINAL) */
        .btn-pink {
            background: #ff6fa5;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-pink:hover {
            background: #ff4f90;
            color: white;
            transform: scale(1.05);
        }

        /* CARD */
        .card {
            border-radius: 15px;
        }

        /* LIST */
        .list-group-item {
            border: none;
        }

        /* 🔥 NAVBAR TEXT FIX */
        .navbar .nav-link {
            color: black !important;
            font-weight: 600;
        }

        .navbar .nav-link:hover {
            color: white !important;
        }

        .navbar-brand {
            color: white !important;
        }

    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg shadow" style="background:#ff6fa5;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">SmartCity</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports/">Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
                <li class="nav-item"><a class="nav-link" href="/contacts/">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔥 ALERT -->
<div class="container mt-3">
    {% if messages %}
        {% for message in messages %}
            <div class="alert 
                {% if message.tags == 'error' %}alert-danger
                {% elif message.tags == 'warning' %}alert-warning
                {% elif message.tags == 'info' %}alert-info
                {% else %}alert-success
                {% endif %}
                alert-dismissible fade show shadow-sm"
                role="alert">

                {{ message }}

                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
</div>

<!-- 🔥 MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- 🔥 DELETE CONFIRM -->
<script>
function confirmDelete(event, id){
    event.preventDefault();

    Swal.fire({
        title: 'Yakin?',
        text: "Data akan dihapus permanen!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff6fa5',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Hapus',
        cancelButtonText: 'Batal'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/delete/" + id + "/";
        }
    });
}
</script>

</body>
</html>
