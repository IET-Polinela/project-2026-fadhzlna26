{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Dashboard</h2>

<div class="row">
  <div class="col-md-6">
    <div class="card p-3 shadow-sm">
      <h6 class="text-center fw-bold">Distribusi Status</h6>
      <div style="height: 420px;">
        <canvas id="statusChart"></canvas>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card p-3 shadow-sm">
      <h6 class="text-center fw-bold">Distribusi Kategori</h6>
      <div style="height: 420px;">
        <canvas id="categoryChart"></canvas>
      </div>
    </div>
  </div>
</div>

<hr>

<div class="row mt-4">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white fw-bold">
        5 Laporan Terbaru (REPORTED)
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Judul</th>
              <th>Kategori</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="reportedTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white fw-bold">
        5 Laporan Selesai (RESOLVED)
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Judul</th>
              <th>Kategori</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="resolvedTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// 🔥 FUNCTION WARNA STATUS (TABEL)
function getStatusBadge(status) {
  if (status === 'REPORTED') return 'bg-secondary';
  if (status === 'VERIFIED') return 'bg-primary';
  if (status === 'IN_PROGRESS') return 'bg-warning text-dark';
  if (status === 'RESOLVED') return 'bg-success';
  return 'bg-dark';
}

fetch('/dashboard/data/')
  .then(res => res.json())
  .then(data => {

    // ===== STATUS CHART =====
    const statusLabels = data.status.map(item => item.status);
    const statusValues = data.status.map(item => item.total);

    // 🔥 FIX WARNA (DINAMIS BERDASARKAN LABEL)
    const statusColorMap = {
      'REPORTED': '#6c757d',
      'VERIFIED': '#0d6efd',
      'IN_PROGRESS': '#ffc107',
      'RESOLVED': '#198754'
    };

    const dynamicColors = statusLabels.map(label => statusColorMap[label]);

    new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: statusLabels,
        datasets: [{
          data: statusValues,
          backgroundColor: dynamicColors
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom'
          }
        }
      }
    });

    // ===== CATEGORY CHART =====
    const catLabels = data.category.map(item => item.category);
    const catValues = data.category.map(item => item.total);

    new Chart(document.getElementById('categoryChart'), {
      type: 'bar',
      data: {
        labels: catLabels,
        datasets: [{
          label: 'Jumlah Laporan',
          data: catValues,
          backgroundColor: '#0d6efd'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    // ===== TABLE REPORTED =====
    const reportedTable = document.getElementById('reportedTable');
    data.reported.forEach(item => {
      reportedTable.innerHTML += `
        <tr>
          <td>${item.title}</td>
          <td><span class="badge bg-info">${item.category}</span></td>
          <td><span class="badge ${getStatusBadge(item.status)}">${item.status}</span></td>
        </tr>
      `;
    });

    // ===== TABLE RESOLVED =====
    const resolvedTable = document.getElementById('resolvedTable');
    data.resolved.forEach(item => {
      resolvedTable.innerHTML += `
        <tr>
          <td>${item.title}</td>
          <td><span class="badge bg-info">${item.category}</span></td>
          <td><span class="badge ${getStatusBadge(item.status)}">${item.status}</span></td>
        </tr>
      `;
    });

  });
</script>

{% endblock %}
