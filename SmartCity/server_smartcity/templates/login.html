{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="w-100" style="max-width: 650px;">
        <div class="card p-4 shadow-lg">

            <h3 class="text-center mb-3 fw-bold">Login</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {% if form.username.errors %}
                        {{ form.username }}
                    {% else %}
                        <input type="text" name="username" class="form-control" value="{{ form.username.value|default:'' }}" required>
                    {% endif %}
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="loginPasswordField" class="form-control" required>
                        <button type="button" class="btn btn-outline-secondary" 
                                onclick="togglePasswordLogin()">
                            <i class="bi bi-eye-fill" id="loginPasswordIcon"></i>
                        </button>
                    </div>
                </div>

                <button class="btn btn-pink w-100 mt-3">Login</button>
            </form>

            <p class="text-center mt-3">
                Belum punya akun?
                <a href="/register/" class="fw-bold text-decoration-none" style="color:#ff6fa5;">
                    Register
                </a>
            </p>

        </div>
    </div>
</div>

<script>
function togglePasswordLogin() {
    const field = document.getElementById('loginPasswordField');
    const icon = document.getElementById('loginPasswordIcon');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye-fill');
        icon.classList.add('bi-eye-slash-fill');
    } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash-fill');
        icon.classList.add('bi-eye-fill');
    }
}
</script>

{% endblock %}
